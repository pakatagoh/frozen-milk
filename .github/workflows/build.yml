name: Build and Publish Docker Image

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag
        id: image_tag
        run: |
          echo "tag=$(date -u +%s%3N)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "Computed image tag: $(date -u +%s%3N)-${GITHUB_SHA::7}"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/pakatagoh/frozen-milk:${{ steps.image_tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prune old image versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP: "10"
          PACKAGE: frozen-milk
        run: |
          set -euo pipefail

          versions=$(gh api --paginate \
              "/user/packages/container/${PACKAGE}/versions" \
              --jq '[.[] | {id, created_at, tags: (.metadata.container.tags // [])}]' \
              2>/dev/null || echo "[]")

          if [[ "$versions" == "[]" ]]; then
            echo "No versions found (first run?). Skipping prune."
            exit 0
          fi

          to_delete=$(echo "$versions" \
            | jq -r --argjson keep "$KEEP" \
              'sort_by(.created_at) | reverse | .[$keep:] | .[].id')

          if [[ -z "${to_delete}" ]]; then
            echo "Nothing to prune (≤ ${KEEP} versions)."
            exit 0
          fi

          for id in $to_delete; do
            echo "Deleting version ${id}..."
            gh api -X DELETE "/user/packages/container/${PACKAGE}/versions/${id}"
          done
          echo "Prune complete."
