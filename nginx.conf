# nginx reverse proxy — mirrors the k3s Traefik ingress routing
server {
    listen 80;
    server_name _;

    # Use Docker's embedded DNS for runtime resolution (avoids startup
    # failure when the upstream container isn't ready yet).
    resolver 127.0.0.11 valid=30s;

    # imgproxy: /img/* → imgproxy:8080
    # imgproxy has IMGPROXY_PATH_PREFIX=/img so it expects /img/… paths
    location /img {
        set $imgproxy_upstream "http://imgproxy:8080";
        proxy_pass $imgproxy_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Baby app: everything else → app:3000
    location / {
        set $app_upstream "http://app:3000";
        proxy_pass $app_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
